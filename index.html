<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="card">
            <div class="tabs">
                <button id="tab-l" class="active" onclick="switchTab('login')">Entrar</button>
                <button id="tab-c" onclick="switchTab('cadastro')">Cadastrar</button>
            </div>
            <div id="form-login">
                <input type="email" id="email-l" placeholder="E-mail">
                <input type="password" id="pass-l" placeholder="Senha">
                <button class="btn-main" onclick="processar('login')">Entrar</button>
            </div>
            <div id="form-cad" style="display:none">
                <input type="text" id="nome-c" placeholder="Nome">
                <input type="email" id="email-c" placeholder="E-mail">
                <input type="password" id="pass-c" placeholder="Senha">
                <button class="btn-main" onclick="processar('cadastro')">Criar Conta</button>
            </div>
        </div>
    </div>

    <div id="main-site" style="display:none">
        <header>
            <h2 id="user-display">Painel</h2>
            <button class="btn-sair" onclick="location.reload()">Sair</button>
        </header>

        <div class="container">
            <section class="box">
                <h3>📝 Bloco de Notas</h3>
                <textarea id="nota-txt" placeholder="Escreva algo..."></textarea>
                <button class="btn-main" onclick="enviar('salvar_nota')">Salvar Nota</button>
            </section>

            <section class="box">
                <h3>📁 Upload de Link</h3>
                <input type="text" id="midia-link" placeholder="Link do GIF/Vídeo/Imagem">
                <select id="midia-tipo">
                    <option value="imagem">Imagem/GIF</option>
                    <option value="video">Vídeo</option>
                </select>
                <button class="btn-main" onclick="enviar('adicionar_midia')">Postar Agora</button>
            </section>

            <section>
                <h3>🖼️ Minha Galeria</h3>
                <div class="grid" id="galeria"></div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
