<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo Cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="card">
            <input type="email" id="email-l" placeholder="Email">
            <input type="password" id="pass-l" placeholder="Senha">
            <button onclick="processar('login')">Entrar</button>
            <button onclick="document.getElementById('form-cad').style.display='block'">Cadastrar</button>
            <div id="form-cad" style="display:none; margin-top:10px;">
                <input type="text" id="nome-c" placeholder="Nome">
                <input type="email" id="email-c" placeholder="Novo Email">
                <input type="password" id="pass-c" placeholder="Nova Senha">
                <button onclick="processar('cadastro')">Confirmar Cadastro</button>
            </div>
        </div>
    </div>

    <div id="main-site" style="display:none">
        <header>
            <h2>☁️ Nuvem Pessoal</h2>
            <button onclick="sair()">Sair</button>
        </header>
        <div class="upload-area">
            <input type="file" id="input-arquivo" onchange="enviarArquivo()">
            <p id="status-upload"></p>
        </div>
        <div id="galeria" class="grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
