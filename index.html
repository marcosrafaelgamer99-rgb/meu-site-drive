<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo Pro | 2TB Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-screen">
        <div class="card">
            <div class="tabs">
                <button id="tab-l" class="active" onclick="switchTab('login')">Entrar</button>
                <button id="tab-c" onclick="switchTab('cadastro')">Cadastrar</button>
            </div>
            
            <div id="form-login">
                <h2>Acessar Acervo</h2>
                <input type="email" id="email-l" placeholder="Seu E-mail">
                <input type="password" id="pass-l" placeholder="Sua Senha">
                <button class="btn-main" onclick="processar('login')">Entrar agora</button>
            </div>

            <div id="form-cad" style="display:none">
                <h2>Criar Conta</h2>
                <input type="text" id="nome-c" placeholder="Como quer ser chamado?">
                <input type="email" id="email-c" placeholder="E-mail para login">
                <input type="password" id="pass-c" placeholder="Crie uma senha forte">
                <button class="btn-main" onclick="processar('cadastro')">Finalizar Cadastro</button>
            </div>
        </div>
    </div>

    <div id="main-site" style="display:none">
        <header>
            <div class="logo">☁️ Meu Acervo <span>PRO</span></div>
            <button class="btn-sair" onclick="sair()">Sair da Conta</button>
        </header>

        <div class="container">
            <div class="upload-area">
                <h3>Gerenciar Meus 2TB</h3>
                <p>Envie imagens, vídeos ou GIFs diretamente para o Drive.</p>
                
                <label class="btn-upload">
                    <span>+ Adicionar Nova Mídia</span>
                    <input type="file" id="input-arquivo" accept="image/*,video/*,.gif" hidden onchange="enviarArquivo()">
                </label>
                
                <div id="status-upload" class="status-msg"></div>
            </div>

            <section class="gallery-section">
                <h3>Minha Galeria</h3>
                <div class="grid" id="galeria">
                    </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
