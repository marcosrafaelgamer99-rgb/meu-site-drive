<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="card">
            <h2>Nuvem Pessoal</h2>
            <div id="login-fields">
                <input type="email" id="email-l" placeholder="Seu Email">
                <input type="password" id="pass-l" placeholder="Sua Senha">
                <button class="btn-primary" onclick="processar('login')">Entrar</button>
                <button class="btn-link" onclick="toggleAuth(true)">Criar conta</button>
            </div>
            <div id="cad-fields" style="display:none">
                <input type="text" id="nome-c" placeholder="Nome">
                <input type="email" id="email-c" placeholder="Email">
                <input type="password" id="pass-c" placeholder="Senha">
                <button class="btn-primary" onclick="processar('cadastro')">Cadastrar</button>
                <button class="btn-link" onclick="toggleAuth(false)">Já tenho conta</button>
            </div>
        </div>
    </div>

    <div id="main-site" style="display:none">
        <header>
            <h3>Minha Nuvem</h3>
            <button onclick="sair()">Sair</button>
        </header>
        <div class="upload-section">
            <label class="custom-upload">
                + Adicionar Arquivo
                <input type="file" id="input-arquivo" onchange="enviarArquivo()" hidden>
            </label>
            <p id="status-upload"></p>
        </div>
        <div id="galeria" class="gallery-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
