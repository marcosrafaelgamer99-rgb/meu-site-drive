<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="card">
            <div class="tabs">
                <button id="tab-l" class="active" onclick="switchTab('login')">Entrar</button>
                <button id="tab-c" onclick="switchTab('cadastro')">Cadastrar</button>
            </div>
            <div id="form-login">
                <input type="email" id="email-l" placeholder="E-mail">
                <input type="password" id="pass-l" placeholder="Senha">
                <button class="btn-main" onclick="processar('login')">Acessar</button>
            </div>
            <div id="form-cad" style="display:none">
                <input type="text" id="nome-c" placeholder="Nome">
                <input type="email" id="email-c" placeholder="E-mail">
                <input type="password" id="pass-c" placeholder="Senha">
                <button class="btn-main" onclick="processar('cadastro')">Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="main-site" style="display:none">
        <header>
            <h2>Meu Acervo</h2>
            <button onclick="location.reload()">Sair</button>
        </header>
        <div class="container">
            <label class="btn-upload">
                + Adicionar Mídia
                <input type="file" id="input-arquivo" hidden onchange="enviarArquivo()">
            </label>
            <p id="status-upload" style="text-align:center; margin-top:10px; color:#3d5afe"></p>
            <div class="grid" id="galeria"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
